<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3-style UFバッファ スクランバー</title>
    <style>
        body { font-family: sans-serif; margin: 30px; background: #fafafa; color: #333; }
        .control-panel { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .checkbox-group { margin-bottom: 15px; }
        .checkbox-group label { font-size: 18px; margin-right: 15px; cursor: pointer; user-select: none; }
        .checkbox-group input { transform: scale(1.3); margin-right: 5px; }
        button { padding: 10px 20px; font-size: 16px; background: #0076d6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #005fa3; }
        .result-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 15px; }
        .procedure-card { background: #eef7ff; padding: 15px; border-radius: 6px; border-left: 5px solid #0076d6; }
        .pair { font-weight: bold; font-size: 1.2em; color: #111; margin-bottom: 5px; }
        .moves { font-family: monospace; font-size: 1.1em; color: #2c3e50; }
        .setup { color: #e67e22; }
        .info-text { color: #666; font-style: italic; }
    </style>
    
    <script src="my_procedures.js"></script>
</head>
<body>

    <h1>3-style 1文字目フィルター表示 (バッファ: UF)</h1>

    <div class="control-panel">
        <h3>表示したい「1文字目」をすべてチェックしてください：</h3>
        <div class="checkbox-group">
            <label><input type="checkbox" class="target-s1" value="あ" checked> あ</label>
            <label><input type="checkbox" class="target-s1" value="い" checked> い</label>
            <label><input type="checkbox" class="target-s1" value="え"> え</label>
            <label><input type="checkbox" class="target-s1" value="き"> き</label>
            <label><input type="checkbox" class="target-s1" value="く"> く</label>
            <label><input type="checkbox" class="target-s1" value="け"> け</label>
        </div>
        <button onclick="filterProcedures()">該当する手順を表示</button>
    </div>

    <div class="result-box">
        <h3>【該当する手順一覧】 (<span id="hit-count">0</span>件ヒット)</h3>
        <div id="grid-output" class="grid-container">
            </div>
    </div>

    <script>
        // ページを読み込んだ時に最初の表示を行う
        window.onload = filterProcedures;

        function filterProcedures() {
            const outputContainer = document.getElementById("grid-output");
            const countDisplay = document.getElementById("hit-count");
            
            // 1. チェックがついている文字（値）をすべて配列に集める
            const checkedBoxes = document.querySelectorAll(".target-s1:checked");
            const activeLetters = Array.from(checkedBoxes).map(box => box.value);

            // 画面をリセット
            outputContainer.innerHTML = "";

            // 万が一データファイルが読み込めていない場合の安全弁
            if (typeof myThreeStyles === 'undefined') {
                outputContainer.innerHTML = '<p class="info-text" style="color:red;">エラー: my_procedures.js が見つからないか、同じフォルダにありません。</p>';
                return;
            }

            if (activeLetters.length === 0) {
                outputContainer.innerHTML = '<p class="info-text">1文字目を最低1つは選択してください。</p>';
                countDisplay.textContent = "0";
                return;
            }

            // 2. 読み込んだmyThreeStylesから、1文字目が一致するものを絞り込む
            const filteredData = myThreeStyles.filter(item => {
                return activeLetters.includes(item.sticker1);
            });

            countDisplay.textContent = filteredData.length;

            // 3. 画面にカードを生成
            filteredData.forEach(target => {
                const card = document.createElement("div");
                card.className = "procedure-card";

                const setupText = target.setup ? `<span class="setup">[${target.setup}]</span> ` : "";
                
                card.innerHTML = `
                    <div class="pair">【${target.sticker1}${target.sticker2}】</div>
                    <div class="moves">${setupText}[${target.move1}, ${target.move2}]</div>
                `;
                outputContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
